name: Build & Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore BinanceBotWpf.sln

    - name: Build
      run: dotnet build BinanceBotWpf.sln --no-restore

    - name: Test
      run: dotnet test BinanceBotWpf.Tests/BinanceBotWpf.Tests.csproj --no-build --verbosity normal
