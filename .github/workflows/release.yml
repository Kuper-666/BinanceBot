name: Build and Release

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          $csproj = "BinanceBotWpf/BinanceBotWpf.csproj"
          [xml]$xml = Get-Content $csproj
          $version = $xml.Project.PropertyGroup.VersionPrefix
          if (-not $version) { $version = "1.0.0" }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore BinanceBotWpf/BinanceBotWpf.csproj

      - name: Publish
        run: dotnet publish BinanceBotWpf/BinanceBotWpf.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:DebugType=none -p:DebugSymbols=false -o ./publish

      - name: Create ZIP
        run: Compress-Archive -Path .\publish\* -DestinationPath BinanceBot_v${{ steps.get_version.outputs.VERSION }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          files: BinanceBot_v${{ steps.get_version.outputs.VERSION }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GT_TOKEN }}
