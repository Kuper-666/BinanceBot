name: Build and Release

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - 'BinanceBotWpf/BinanceBotWpf.csproj'   # Не запускать при изменении .csproj (коммит версии)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Skip if version bump commit
        id: skip
        run: |
          if git log -1 --pretty=%B | grep -q "Bump version to"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Setup .NET
        if: steps.skip.outputs.skip == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Get and increment version
        if: steps.skip.outputs.skip == 'false'
        id: get_version
        shell: pwsh
        run: |
          $csproj = "BinanceBotWpf/BinanceBotWpf.csproj"
          [xml]$xml = Get-Content $csproj
          $current = $xml.Project.PropertyGroup.VersionPrefix
          if (-not $current) { $current = "1.0.0" }
          $parts = $current -split '\.'
          $newVersion = "$($parts[0]).$($parts[1]).$([int]$parts[2] + 1)"
          Write-Host "New version: $newVersion"
          $xml.Project.PropertyGroup.VersionPrefix = $newVersion
          $xml.Save($csproj)
          echo "VERSION=$newVersion" >> $env:GITHUB_OUTPUT

      - name: Commit version bump
        if: steps.skip.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add BinanceBotWpf/BinanceBotWpf.csproj
          git commit -m "Bump version to ${{ steps.get_version.outputs.VERSION }}" || echo "No changes"
          git push

      - name: Restore
        if: steps.skip.outputs.skip == 'false'
        run: dotnet restore BinanceBotWpf/BinanceBotWpf.csproj

      - name: Publish
        if: steps.skip.outputs.skip == 'false'
        run: dotnet publish BinanceBotWpf/BinanceBotWpf.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:DebugType=none -p:DebugSymbols=false -o ./publish

      - name: Create ZIP
        if: steps.skip.outputs.skip == 'false'
        run: Compress-Archive -Path .\publish\* -DestinationPath BinanceBot_v${{ steps.get_version.outputs.VERSION }}.zip

      - name: Create Release
        if: steps.skip.outputs.skip == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          files: BinanceBot_v${{ steps.get_version.outputs.VERSION }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
